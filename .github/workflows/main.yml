
name: Hy2_Aggressive_Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - name: Grab and Filter
        run: |
          mkdir -p providers
          > providers/hy2_list.txt
          while IFS= read -r url; do
            echo "Checking $url..."
            curl -L -s -H "User-Agent: Mozilla/5.0" "$url" >> temp_raw.txt
          done < sources/list.txt
          grep -o "hysteria2://[^#]*" temp_raw.txt | sort -u > providers/hy2_list.txt
          echo "Found $(wc -l < providers/hy2_list.txt) proxies"
      - name: Push to Repo
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt sources/list.txt
          git commit -m "Aggressive update via GitHub Action" || exit 0
          git push origin main
