name: Hy2 Ultra Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Build Hy2 list
        run: |
          mkdir -p providers

          BASE_URL="https://raw.githubusercontent.com/whoahaow/rjsxrd/main/githubmirror/split-by-protocols"

          # hy2.txt
          if curl -f -s -L "${BASE_URL}/hy2.txt" > /dev/null; then
            curl -f -s -L "${BASE_URL}/hy2.txt" |
              grep -i "hysteria2://" >> providers/hy2_list.txt
          else
            echo "⚠️ hy2.txt missing"
          fi

          # hy2-secure.txt
          if curl -f -s -L "${BASE_URL}/hy2-secure.txt" > /dev/null; then
            curl -f -s -L "${BASE_URL}/hy2-secure.txt" |
              grep -i "hysteria2://" >> providers/hy2_list.txt
          else
            echo "⚠️ hy2-secure.txt missing"
          fi

          # Убираем дубли и пустые строки
          sort -u providers/hy2_list.txt -o providers/hy2_list.txt
          sed -i '/^$/d' providers/hy2_list.txt

      - name: Commit and push
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          git commit -m "Update Hy2 providers via Action" || echo "No changes"
          git push origin main
