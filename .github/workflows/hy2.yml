name: Hy2 Ultra Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *' # Твои родные 12 часов

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Smart Scanner 🚀
        run: python scanner.py

      - name: Push Results
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          
          # Проверяем изменения, чтобы не плодить пустые коммиты
          if git diff --staged --quiet; then
            echo "No changes in server list"
          else
            git commit -m "Auto-update Hy2: $(date +'%d.%m %H:%M') [Servers: $(wc -l < providers/hy2_list.txt)]"
            git pull --rebase origin main
            git push origin main
          fi