name: Hy2 Ultra Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Collect
        run: |
          mkdir -p providers
          > raw_data.txt
          
          # Список файлов, которые мы видим на твоем скриншоте
          FILES=("hy2.txt" "hy2-secure.txt" "hysteria2.txt" "hysteria2-secure.txt")
          BASE_URL="https://raw.githubusercontent.com/whoahaow/rjsxrd/main/githubmirror/split-by-protocols"

          for file in "${FILES[@]}"; do
            echo "📡 Пробую скачать: $file"
            curl -f -s -L --retry 3 -A "Mozilla/5.0" "$BASE_URL/$file" >> raw_data.txt || echo "⚠️ Файл $file не найден"
            echo "" >> raw_data.txt
          done

          if [ -s raw_data.txt ]; then
            # Очистка и фильтрация
            tr -d '\r' < raw_data.txt | grep -i "hysteria2://" | sort -u > providers/hy2_list.txt
            echo "✅ ПОБЕДА! Найдено серверов: $(wc -l < providers/hy2_list.txt)"
          else
            echo "❌ ОПЯТЬ ПУСТО! Проверь права доступа к raw-файлам."
            exit 1
          fi

      - name: Push
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          git commit -m "Auto-update Hy2 from all sources: $(date)" || echo "No changes"
          git push origin main