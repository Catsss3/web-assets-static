name: Hy2 Ultra Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - name: Build Hy2 list
        run: |
          set -euo pipefail
          mkdir -p providers
          SOURCES=(
            "https://raw.githubusercontent.com/whoahaow/rjsxrd/main/githubmirror/split-by-protocols/hy2.txt"
            "https://raw.githubusercontent.com/whoahaow/rjsxrd/main/githubmirror/split-by-protocols/hy2-secure.txt"
          )
          > temp_raw.txt
          for url in "${SOURCES[@]}"; do
            echo "Grabbing $url..."
            curl -f -s -L -A "Mozilla/5.0" "$url" >> temp_raw.txt || echo "Failed $url"
            echo "" >> temp_raw.txt
          done
          grep -i "hysteria2://" temp_raw.txt | sort -u | sed '/^$/d' > providers/hy2_list.txt
          echo "✅ Done! Found $(wc -l < providers/hy2_list.txt) proxies."
      - name: Push to Repo
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          git commit -m "Auto-update Hy2 list: $(date +'%d-%m-%Y %H:%M')" || echo "No changes"
          git push origin main