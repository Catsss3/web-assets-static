name: Hy2 Ultra Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          fetch-depth: 1

      - name: Prepare output directory
        run: mkdir -p "${{ github.workspace }}/providers"

      - name: Build Hy2 list
        shell: bash
        run: |
          export BASE_URL="https://raw.githubusercontent.com/whoahaow/rjsxrd/main/githubmirror/split-by-protocols"
          OUT="${{ github.workspace }}/providers/hy2_list.txt"
          : > "$OUT"

          if curl -f -s -L "${BASE_URL}/hy2.txt" > /dev/null; then
            curl -f -s -L "${BASE_URL}/hy2.txt" |
              grep -i "hysteria2://" >> "$OUT"
          else
            echo "⚠️ hy2.txt missing"
          fi

          if curl -f -s -L "${BASE_URL}/hy2-secure.txt" > /dev/null; then
            curl -f -s -L "${BASE_URL}/hy2-secure.txt" |
              grep -i "hysteria2://" >> "$OUT"
          else
            echo "⚠️ hy2-secure.txt missing"
          fi

          sort -u "$OUT" -o "$OUT"
          sed -i '/^$/d' "$OUT"

          echo "✅ Готово. Найдено $(wc -l < "$OUT") строк."
          head -n 10 "$OUT"

      - name: Commit and push
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          git commit -m "Update Hy2 providers via Action" || echo "No changes"
          git push origin main
