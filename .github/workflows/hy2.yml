name: Hy2 Ultra Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # Запуск каждые 12 часов

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pyyaml beautifulsoup4

      - name: Run Discovery 🔍
        run: python discovery_ultra.py\n        env:\n          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Run Smart Scanner 🚀
        run: python scanner.py

      - name: Push Results
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          
          # Добавляем результаты сканирования и обновленный список источников
          git add providers/hy2_list.txt sources/telegram_channels.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SERVER_COUNT=$(wc -l < providers/hy2_list.txt || echo "0")
            git commit -m "Auto-update: $(date +'%d.%m %H:%M') [Servers: $SERVER_COUNT]"
            git pull --rebase origin main
            git push origin main
          fi
