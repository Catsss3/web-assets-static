name: Hy2 Ultra Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Collect
        run: |
          mkdir -p providers
          > raw_data.txt
          
          # ТЕПЕРЬ ИСПОЛЬЗУЕМ ВЕТКУ 'mirror'
          echo "📡 Download Hy2 from mirror branch..."
          curl -f -s -L --retry 3 -A "Mozilla/5.0" "https://raw.githubusercontent.com/whoahaow/rjsxrd/mirror/githubmirror/split-by-protocols/hy2" >> raw_data.txt || echo "Skip hy2"
          
          echo "📡 Download Hy2-Secure from mirror branch..."
          curl -f -s -L --retry 3 -A "Mozilla/5.0" "https://raw.githubusercontent.com/whoahaow/rjsxrd/mirror/githubmirror/split-by-protocols/hy2-secure" >> raw_data.txt || echo "Skip secure"

          if [ -s raw_data.txt ]; then
            tr -d '\r' < raw_data.txt | grep -i "hysteria2://" | sort -u > providers/hy2_list.txt
            echo "✅ SUCCESS! Found $(wc -l < providers/hy2_list.txt) servers."
          else
            echo "❌ STILL EMPTY! Check the URLs manually."
            exit 1
          fi

      - name: Push
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          git commit -m "Auto-update Hy2 (mirror branch): $(date)" || echo "No changes"
          git push origin main