name: Hy2_Ultra_Scanner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Collect Hy2
        run: |
          mkdir -p providers
          # Качаем из Goida и RJSXRD, выцепляем только hy2
          curl -L -s https://raw.githubusercontent.com/AvenCores/goida-vpn-configs/main/all.txt | grep "hysteria2://" > providers/hy2_list.txt || echo "" > providers/hy2_list.txt
          curl -L -s https://raw.githubusercontent.com/whoahaow/rjsxrd/main/githubmirror/all.txt | grep "hysteria2://" >> providers/hy2_list.txt || echo "" >> providers/hy2_list.txt
          # Убираем дубли и пустые строки
          sort -u providers/hy2_list.txt -o providers/hy2_list.txt
          sed -i '/^$/d' providers/hy2_list.txt

      - name: Push results
        run: |
          git config --global user.name "Catsss3"
          git config --global user.email "vehesslav@gmail.com"
          git add providers/hy2_list.txt
          git commit -m "Update Hy2 providers via Action" || echo "No changes to commit"
          git push origin main
